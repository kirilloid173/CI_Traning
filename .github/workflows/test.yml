name: CI_Training
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v3
            - name: Install Node
              uses: actions/setup-node@v3
              with:
                  node-version: 22
            - name: Install dependencies
              run: npm ci
            - name: build project
              run: npm run build
            - name: upload build data
              uses: actions/upload-artifact@v4
              with:
                  name: build_data
                  path: dist
    print_info:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: show_env_data
              run: echo "${{ toJSON(github) }}"
    deploy_server:
        runs-on: ubuntu-latest
        needs: print_info
        steps:
            - name: download_build_data
              uses: actions/download-artifact@v4
              with:
                  name: build_data
            - name: show_data
              run: ls
