name: CI_Training
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v3
            - name: Install Node
              uses: actions/setup-node@v3
              with:
                  node-version: 18
            - name: Install dependencies
              run: npm ci
    deploy_server:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: show_env_data
              run: echo "${{ github }}"
