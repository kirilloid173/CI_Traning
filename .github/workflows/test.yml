name: CI

on:
	push:
		branches: [ main ]

jobs:
	build:
		runs-on: ubuntu-latest
		steps:
			- name: Checkout repository
				uses: actions/checkout@v4

			- name: Use Node.js
				uses: actions/setup-node@v4
				with:
					node-version: '18'
					cache: 'npm'

			- name: Install dependencies
				run: npm ci

			- name: Build (if present)
				run: npm run build --if-present

			- name: Run tests
				run: npm test

